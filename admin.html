<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetim Paneli | Anonim Erkek Kuaförü</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/favicon-64.png" type="image/png">
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    var saved = localStorage.getItem("theme");
    document.documentElement.setAttribute("data-theme", saved || "light");
  })();
</script>
<style>
  .admin-wrap { max-width: 900px; margin: 0 auto; padding: 120px 24px 100px; }
  .admin-gate-wrap { max-width: 360px; margin: 160px auto 100px; padding: 0 24px; }
  .admin-card { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 18px; padding: 26px; }
  .admin-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .admin-field input, .admin-field select { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; width: 100%; box-sizing: border-box; }
  .admin-btn { display: inline-block; padding: 12px 20px; border-radius: 999px; background: var(--accent); color: #fff; border: none; font-weight: 600; font-size: 15px; cursor: pointer; width: 100%; }
  .admin-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 10px; }
  .admin-tabs { display: flex; gap: 8px; margin: 20px 0 24px; border-bottom: 1px solid var(--border); }
  .admin-tab { padding: 10px 18px; border: none; background: none; color: var(--text-soft); font-weight: 600; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; }
  .admin-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .admin-pane { display: none; }
  .admin-pane.active { display: block; }
  .admin-empty { color: var(--text-soft); text-align: center; padding: 40px 0; }

  .msg-row { border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; background: var(--bg-soft); }
  .msg-row.done { opacity: .55; }
  .msg-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .msg-head b { font-size: 16px; }
  .msg-date { font-size: 12px; color: var(--text-soft); }
  .msg-phone { font-size: 13px; color: var(--text-soft); margin: 2px 0 10px; }
  .msg-body { font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; }
  .msg-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .msg-actions button, .msg-actions a { border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }
  .btn-primary-sm { background: var(--accent); color: #fff; }
  .btn-del { background: #d1242f; color: #fff; }

  .profile-form { display: none; margin-top: 14px; padding: 16px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); }
  .profile-form.open { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .profile-form input, .profile-form select { padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-soft); color: var(--text); font-size: 13.5px; font-family: inherit; }
  .profile-form label { font-size: 12px; color: var(--text-soft); display: block; margin-bottom: 4px; }
  .profile-form-full { grid-column: 1 / -1; }

  .cust-card { border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; background: var(--bg-soft); position: relative; }
  .cust-card.overdue { border-color: #d1242f; background: rgba(209,36,47,.06); }
  .cust-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .cust-head b { font-size: 16px; }
  .cust-badge { font-size: 11.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px; }
  .cust-badge.ok { background: rgba(47,158,110,.15); color: #2f9e6e; }
  .cust-badge.soon { background: rgba(240,180,41,.18); color: #b8860b; }
  .cust-badge.overdue { background: rgba(209,36,47,.15); color: #d1242f; }
  .cust-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 12px; font-size: 13.5px; }
  .cust-grid .l { color: var(--text-soft); font-size: 11.5px; text-transform: uppercase; letter-spacing: .02em; margin-bottom: 2px; }
  .cust-edit { display: none; margin-top: 14px; padding: 14px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); grid-template-columns: 1fr 1fr; gap: 10px; }
  .cust-edit.open { display: grid; }
  .cust-edit input, .cust-edit select { padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-soft); color: var(--text); font-size: 13.5px; font-family: inherit; }
  .cust-edit label { font-size: 12px; color: var(--text-soft); display: block; margin-bottom: 4px; }
  .cust-edit-full { grid-column: 1 / -1; display: flex; gap: 8px; }

  .hizmet-group { border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; }
  .hizmet-group-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; background: var(--bg-soft); cursor: pointer; }
  .hizmet-group-head b { font-size: 15px; }
  .hizmet-group-count { font-size: 12.5px; color: var(--text-soft); font-weight: 600; }
  .hizmet-group-body { display: none; padding: 6px 18px 14px; }
  .hizmet-group.open .hizmet-group-body { display: block; }
  .hizmet-group.open .hizmet-group-arrow { transform: rotate(180deg); }
  .hizmet-group-arrow { transition: transform .15s ease; color: var(--text-soft); }
  .hizmet-cust-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); font-size: 13.5px; gap: 10px; flex-wrap: wrap; }
  .hizmet-cust-row:first-child { border-top: none; }
  .hizmet-cust-name { font-weight: 600; }
  .hizmet-cust-sub { color: var(--text-soft); font-size: 12.5px; }
  #adminMsg { padding: 10px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-bottom: 16px; display: none; }
  #adminMsg.ok { background: rgba(31,58,61,.12); color: var(--accent); display: block; }
  #adminMsg.err { background: rgba(209,36,47,.12); color: #d1242f; display: block; }
</style>
</head>
<body>

<header style="border-bottom:1px solid var(--border); padding:16px 24px;">
  <div style="max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
    <a href="index.html" style="font-weight:700;font-size:18px;">Anonim <span style="color:var(--accent)">Erkek Kuaförü</span></a>
    <span style="font-weight:600;color:var(--text-soft);font-size:14px;">Yönetim Paneli</span>
  </div>
</header>

<main>
  <section id="adminGate" class="admin-gate-wrap">
    <div class="admin-card">
      <h2 style="margin-bottom:16px;">Yönetim Girişi</h2>
      <div class="admin-field">
        <label for="adminPass">Admin Şifresi</label>
        <input type="password" id="adminPass">
      </div>
      <button class="admin-btn" id="adminEnterBtn">Giriş Yap</button>
    </div>
  </section>

  <section id="adminPanel" class="admin-wrap" style="display:none;">
    <div id="adminMsg"></div>
    <div class="admin-topbar">
      <h2 style="margin:0;">Anonim Erkek Kuaförü — CRM</h2>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="mesajlar">Gelen Mesajlar</button>
      <button class="admin-tab" data-tab="musteriler">Müşteri Profilleri</button>
      <button class="admin-tab" data-tab="hizmete-gore">Hizmete Göre</button>
    </div>

    <div class="admin-pane active" id="pane-mesajlar">
      <p id="msgCount" style="font-size:14px;color:var(--text-soft);margin-bottom:16px;"></p>
      <div id="msgList"></div>
    </div>

    <div class="admin-pane" id="pane-musteriler">
      <p id="custCount" style="font-size:14px;color:var(--text-soft);margin-bottom:16px;"></p>
      <div id="custList"></div>
    </div>

    <div class="admin-pane" id="pane-hizmete-gore">
      <p style="font-size:14px;color:var(--text-soft);margin-bottom:16px;">Müşterileri son aldıkları hizmete göre gruplu görün.</p>
      <div id="hizmetList"></div>
    </div>
  </section>
</main>

<script src="admin.js"></script>
</body>
</html>
